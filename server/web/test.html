<!DOCTYPE html>
<html>
<head>
    <title>Wayback Proxy Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Wayback Proxy System Test</h1>

    <div class="test-section">
        <h2>Test 1: Server Status</h2>
        <div id="test1-result">Testing...</div>
    </div>

    <div class="test-section">
        <h2>Test 2: Page List</h2>
        <div id="test2-result">Testing...</div>
    </div>

    <div class="test-section">
        <h2>Test 3: Proxy URL</h2>
        <div id="test3-result">Testing...</div>
    </div>

    <div class="test-section">
        <h2>Test 4: View Archived Page</h2>
        <div id="test4-result">
            <button onclick="openArchivedPage()">Open Archived Page in New Tab</button>
        </div>
    </div>

    <script>
        let pageId = null;
        let timestamp = null;

        // Test 1: Check server
        fetch('/api/pages')
            .then(r => r.json())
            .then(data => {
                document.getElementById('test1-result').innerHTML =
                    '<span class="success">✓ Server is running</span>';

                if (data.length > 0) {
                    pageId = data[0].id;
                    timestamp = data[0].captured_at;

                    // Test 2: Show page info
                    document.getElementById('test2-result').innerHTML = `
                        <span class="success">✓ Found ${data.length} pages</span><br>
                        <span class="info">Testing with Page ID: ${pageId}</span><br>
                        <span class="info">URL: ${data[0].url}</span><br>
                        <span class="info">Title: ${data[0].title}</span><br>
                        <span class="info">Captured: ${timestamp}</span>
                    `;

                    // Test 3: Try proxy URL
                    testProxyURL();
                } else {
                    document.getElementById('test2-result').innerHTML =
                        '<span class="error">✗ No pages found</span>';
                }
            })
            .catch(err => {
                document.getElementById('test1-result').innerHTML =
                    '<span class="error">✗ Server error: ' + err + '</span>';
            });

        function testProxyURL() {
            // 尝试一个测试URL
            const testURL = `/archive/${pageId}/20260309191322/https://abs.twimg.com/responsive-web/client-web/main.123.js`;

            fetch(testURL)
                .then(r => {
                    document.getElementById('test3-result').innerHTML = `
                        <span class="info">Proxy URL: ${testURL}</span><br>
                        <span class="${r.ok ? 'success' : 'error'}">
                            HTTP Status: ${r.status} ${r.statusText}
                        </span><br>
                        <span class="info">Note: 404 is expected if this specific resource doesn't exist</span>
                    `;
                })
                .catch(err => {
                    document.getElementById('test3-result').innerHTML =
                        '<span class="error">✗ Proxy error: ' + err + '</span>';
                });
        }

        function openArchivedPage() {
            if (pageId) {
                window.open(`/view/${pageId}`, '_blank');
            } else {
                alert('No page ID available');
            }
        }
    </script>
</body>
</html>
